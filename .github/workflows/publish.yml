name: Publish to npm

on:
    release:
        types: [published]

permissions:
    contents: read
    id-token: write

jobs:
    publish:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Vite+
              uses: voidzero-dev/setup-vp@v1
              with:
                  node-version: "24"
                  cache: true

            - name: Run tests
              run: vp test

            - name: Build package
              run: vp run build

            - name: Publish to npm with provenance
              run: npm publish --provenance --access public --tag latest
